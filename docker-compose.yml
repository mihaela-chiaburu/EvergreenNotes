version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: evergreennotes-db
    env_file:
      - .env
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - evergreen-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${SQL_SA_PASSWORD} -Q 'SELECT 1' || exit 1"]
      interval: 10s      
      timeout: 3s       
      retries: 10        
      start_period: 10s  

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evergreennotes-api
    depends_on:
      sqlserver:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=${DB_NAME};User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__ExpiresMinutes=${JWT_EXPIRES_MINUTES}
    ports:
      - "5000:8080"
    networks:
      - evergreen-network

volumes:
  sqlserver-data:

networks:
  evergreen-network:
    driver: bridge
